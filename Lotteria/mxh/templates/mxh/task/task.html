<!DOCTYPE html>
<html lang="vi">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'qlda/styles/Task.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="{% static 'qlda/script/Task.js' %}" defer></script>
    <link rel="stylesheet" href="{% static 'qlda/styles/Home.css' %}">

</head>
<body>
    {% include 'qlda/includes/Header.html' %}
    <div class="main">
        {% include 'qlda/includes/Sidebar.html' %}
        <div class="content">
            <div class="content-area">
                <div class="tab-navigation">
                    <div class="tab active" data-tab="phan-viec" id="phanViecTab">Phân việc</div>
                    <div class="tab" data-tab="todo-list" id="todoListTab">To do list</div>
                </div>

                <!-- Tab: Phân việc -->
                <div class="tab-content active" id="phanViecContent">
                    <div class="action-buttons">
                        <button class="assign-task-btn" id="assignTaskBtn">Giao công việc</button>
                    </div>

                    <div class="task-view">
                        <div class="task-headers">
                            <div class="task-header not-completed active" id="notCompletedHeader">
                                Chưa xong: <span id="notCompletedCount">2</span>
                            </div>
                            <div class="task-header completed" id="completedHeader">
                                Đã xong: <span id="completedCount">2</span>
                            </div>
                        </div>

                        <div class="task-lists-container">
                            <div class="task-list active" id="notCompletedList"></div>
                            <div class="task-list" id="completedList"></div>
                        </div>
                    </div>
                </div>

                <!-- Tab: To do list -->
                <div class="tab-content" id="todoListContent">
                    <div class="todo-input-container">
                        <div class="todo-input">
                            <i class="fas fa-pencil-alt"></i>
                            <input type="text" id="todoInput" placeholder="Nhập công việc cần làm">
                        </div>
                        <button id="addTodoBtn" class="add-todo-btn">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                    <div class="todo-list" id="todoList"></div>
                </div>
                <!-- Modal: Giao việc -->
                <div class="modal" id="taskModal">
                    <div class="modal-content">
                        <h2>Giao công việc mới</h2>
                        <form id="taskForm">
                            <div class="form-group">
                                <label for="taskTitle">Tiêu đề</label>
                                <input type="text" id="taskTitle" placeholder="Nhập tiêu đề">
                            </div>
                            <div class="form-group">
                                <label for="taskContent">Nội dung công việc</label>
                                <textarea id="taskContent" placeholder="Nhập nội dung công việc"></textarea>
                            </div>
                            <div class="form-group">
                                <label for="assignTo">Giao cho <span class="required">*</span></label>
                                <select id="assignTo">
                                    <option value="">Người được giao</option>
                                    <option value="Minh">Minh</option>
                                    <option value="Xuân">Xuân</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="deadline">Thời hạn</label>
                                <input type="date" id="deadline">
                            </div>
                            <div class="form-group">
                                <label for="taskImage">Hình ảnh (nếu có)</label>
                                <div class="image-upload">
                                    <input type="file" id="taskImage" accept="image/*">
                                    <div class="image-preview" id="imagePreview"></div>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="cancel-btn" id="cancelBtn">Huỷ</button>
                                <button type="submit" class="submit-btn">Giao việc</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Modal: Xác nhận xóa -->
                <div class="modal" id="deleteTodoModal">
                    <div class="modal-content">
                        <h2>Xóa công việc</h2>
                        <p>Bạn có chắc muốn xóa công việc <span id="deleteTodoName"></span> không?</p>
                        <div class="form-actions">
                            <button type="button" class="cancel-btn" id="cancelDeleteBtn">Huỷ</button>
                            <button type="button" class="delete-btn" id="confirmDeleteBtn">Xóa</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
