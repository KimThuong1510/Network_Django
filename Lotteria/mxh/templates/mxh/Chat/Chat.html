<!DOCTYPE html>
<html lang="vi">
{% load static %}

<head>
    <meta charset="UTF-8">
    <title>Đoạn chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'mxh/styles/Home.css' %}">
    <link rel="stylesheet" href="{% static 'mxh/styles/Chat.css' %}">

</head>

<body>
    {% include 'mxh/includes/Header.html' %}

    <div class="main">
        {% include 'mxh/includes/Sidebar.html' %}
        <div class="content">
            <div class="chat-interface" id="chat-interface" style="display: none;">
                <div class="chat-container">
                    <!-- Chat Sidebar -->
                    <div class="chat-sidebar">
                        <div class="chat-tabs">
                            <div class="tab active" data-tab="direct">Đoạn chat</div>
                            <div class="tab" data-tab="group">Nhóm</div>
                        </div>
                        <div class="chat-list">
                            <!-- Chat list will be populated dynamically -->
                        </div>
                    </div>

                    <!-- Chat Main -->
                    <div class="chat-main">
                        <div class="chat-header">
                            <div class="chat-user-info">
                                <div class="avatar">
                                    <img src="/placeholder.svg" alt="" id="chat-user-avatar">
                                </div>
                                <div class="user-name" id="chat-user-name"></div>
                            </div>
                        </div>
                        <div class="chat-messages" id="chat-messages">
                            <!-- Messages will be populated dynamically -->
                        </div>
                        <div class="chat-input">
                            <input type="text" placeholder="Soạn tin nhắn" id="message-input">
                            <button class="attach-btn"><i class="fas fa-paperclip"></i></button>
                            <button class="send-btn" id="send-message-btn">Gửi</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
