<!DOCTYPE html>
{% load static %}
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lotteria Chat Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <script src="{% static 'qlda/script/Chat.js' %}"></script>
    <link rel="stylesheet" href="{% static 'qlda/styles/Chat.css' %}">
    <link rel="stylesheet" href="{% static 'qlda/styles/Home.css' %}">
</head>
<body>
    {% include 'qlda/includes/Header.html' %}
  <div class="main">
      {% include 'qlda/includes/Sidebar.html' %}
      <div class="content">
          <div class="modal-overlay" id="groupModal" style="display: none;">
        <div class="modal">
          <h2>Tạo nhóm mới</h2>
          <input type="text" id="groupName" placeholder="Tên nhóm">

          <label class="group-avatar-label">
            Ảnh đại diện nhóm
            <input type="file" id="groupAvatar" accept="image/*">
          </label>

          <div class="member-list">
            <p>Thêm thành viên:</p>
            <label><input type="checkbox" value="Nam"> Nam</label>
            <label><input type="checkbox" value="Thư"> Thư</label>
            <label><input type="checkbox" value="Ngọc"> Ngọc</label>
            <label><input type="checkbox" value="Thương"> Thương</label>
          </div>

          <div class="modal-actions">
            <button onclick="closeModal()">Hủy</button>
            <button onclick="submitGroup()">Tạo nhóm</button>
          </div>
        </div>
      </div>

      <!-- Modal Thêm Thành Viên -->
        <div class="modal-overlay" id="addMemberModal" style="display: none;">
            <div class="modal">
              <h2>Thêm thành viên vào nhóm</h2>
              <!-- Tìm kiếm thành viên -->
              <div class="search-container">
                <input type="text" id="searchMember" placeholder="Tìm kiếm thành viên" onkeyup="searchMembers()" />
              </div>

              <!-- Danh sách thành viên có thể thêm vào nhóm -->
              <div class="member-list" id="member-list">
                <label><input type="checkbox" value="Nam"> Nam</label>
                <label><input type="checkbox" value="Thư"> Thư</label>
                <label><input type="checkbox" value="Ngọc"> Ngọc</label>
                <label><input type="checkbox" value="Thương"> Thương</label>
                <!-- Thêm các thành viên vào đây -->
              </div>

              <div class="modal-actions">
                <button onclick="closeAddMemberModal()">Hủy</button>
                <button onclick="submitAddMember()">Thêm thành viên</button>
              </div>
            </div>
          </div>

      <!-- Modal Đổi Tên Nhóm -->
        <div class="modal-overlay" id="renameGroupModal" style="display: none;">
            <div class="modal">
              <h2>Đổi tên nhóm</h2>
              <!-- Nhập tên mới cho nhóm -->
              <div class="input-container">
                <input type="text" id="newGroupName" placeholder="Nhập tên nhóm mới" />
              </div>

              <div class="modal-actions">
                <button onclick="closeRenameGroupModal()">Hủy</button>
                <button onclick="submitRenameGroup()">Lưu</button>
              </div>
        </div>
  </div>



  <div class="chat-container">
    <!-- Left Panel -->
    <div class="conversation-panel">
      <!-- Tabs -->
      <div class="tabs">
        <div class="tab active" onclick="switchTab('chat')">Đoạn chat</div>
        <div class="tab" onclick="switchTab('group')">Nhóm</div>
      </div>

      <!-- Group actions -->
      <div class="group-actions" id="group-actions" style="display: none;">
        <div class="search-container">
          <i class="fas fa-search search-icon-small"></i>
          <input type="text" id="group-search" placeholder="Tìm kiếm nhóm" onkeyup="searchGroup()" />
        </div>
        <i class="fas fa-edit create-group" onclick="openCreateGroupModal()"></i>
      </div>

      <!-- Danh sách đoạn chat -->
      <div class="conversation-list" id="conversation-list">
        <!-- Nội dung được nạp qua JavaScript -->
      </div>
    </div>

    <!-- Right Panel -->
    <div class="chat-panel">
      <div class="chat-header" id="chat-header"></div>
      <div class="chat-messages" id="chat-messages"></div>

      <div class="comment-input">
        <div class="comment-box">
          <textarea placeholder="Soạn tin nhắn"></textarea>
          <label for="comment-image"><i class="fas fa-image"></i></label>
          <input type="file" id="comment-image" style="display: none;">
        </div>
        <button class="send-btn">Gửi</button>
      </div>
    </div>
  </div>

      </div>

  </div>

</body>
</html>
